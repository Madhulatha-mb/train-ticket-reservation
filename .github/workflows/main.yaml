
     name: TrainBook CI/CD Pipeline

on:
  push:
    branches: ["master", "main"]

jobs:

# ---------------- BUILD + SONAR + NEXUS ----------------
  build-sonar-nexus:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Java 17 FIX (required for SonarQube)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------- Maven Build ----------------
      - name: Build Project
        run: mvn clean package -DskipTests

      # ---------------- SonarQube Scan ----------------
      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=train-ticket-reservation \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # ---------------- Configure Maven for Nexus ----------------
      - name: Configure Maven settings.xml for Nexus
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # ---------------- Deploy to Nexus ----------------
      - name: Deploy Artifact to Nexus
        run: mvn deploy -DskipTests

      # ---------------- Upload WAR Artifact ----------------
      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: target/*.war


# ---------------- DEPLOY TO TOMCAT ----------------
  deploy-tomcat:

    needs: build-sonar-nexus
    runs-on: ubuntu-latest

    steps:

      # ---------------- Download WAR ----------------
      - name: Download WAR
        uses: actions/download-artifact@v4
        with:
          name: war-file

      # ---------------- Deploy to Tomcat ----------------
      - name: Deploy to Tomcat Server
        run: |
          WAR_FILE=$(find . -name "*.war" | head -1)

          curl -v --fail --show-error \
          --user "${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}" \
          --upload-file "$WAR_FILE" \
          "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"
