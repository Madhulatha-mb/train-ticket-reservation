name: Build and Deploy train-ticket-reservation

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR File
        run: mvn clean package -DskipTests

      - name: Upload WAR to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_REPO_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          WAR_FILE=$(ls target/*.war | head -n 1)

          curl -v -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$WAR_FILE" \
            "$NEXUS_URL/repository/maven-releases/train-ticket-reservation.war"

    
