name: Build and Upload WAR to Nexus

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build WAR File
        run: mvn clean package -DskipTests

      - name: Verify WAR File
        run: |
          ls -la target/
          WAR_FILE=$(find target -name "*.war" | head -n 1)
          echo "WAR File Found: $WAR_FILE"

      - name: Upload WAR to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_REPO_URL }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          WAR_FILE=$(find target -name "*.war" | head -n 1)

          curl -v -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$WAR_FILE" \
            "$NEXUS_URL/repository/maven-releases/$(basename $WAR_FILE)"

      - name: Upload WAR Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: train-ticket-reservation-war
          path: target/*.war
